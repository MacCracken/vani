name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          # cc5_aarch64 packaging changed across the 5.7.x line: pre-5.7.48
          # tarballs ship it under bin/, 5.7.48+ moved it to the tarball
          # top-level. Cover both even though vani doesn't enable aarch64
          # cross-build yet (see "Cross-build aarch64" comment below).
          [ -f "$CYRIUS_DIR/cc5_aarch64" ] && cp "$CYRIUS_DIR/cc5_aarch64" "$HOME/.cyrius/bin/"
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        run: cyrius deps --verify

      - name: Lint
        # Auto-discover so new modules are covered without editing CI.
        # Treat any warning as a failure (fail on any cyrlint "  warn " line).
        run: |
          fail=0
          for f in src/*.cyr programs/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Format check
        # cyrius fmt --check emits the formatted source; diff against the
        # committed file to enforce no drift.
        run: |
          fail=0
          for f in src/*.cyr programs/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            if ! diff -q <(cyrius fmt "$f" --check 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Vet
        run: cyrius vet programs/smoke.cyr

      - name: Verify dist bundle is in sync with src/
        run: |
          cyrius distlib
          if ! git diff --quiet dist/vani.cyr; then
            echo "ERROR: dist/vani.cyr is stale. Run 'cyrius distlib' and commit the result."
            git --no-pager diff dist/vani.cyr | head -40
            exit 1
          fi
          echo "dist/vani.cyr matches src/"

      - name: Build smoke (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build programs/smoke.cyr build/vani_smoke
          echo "vani_smoke: $(wc -c < build/vani_smoke) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/vani_smoke | grep -q "7f45 4c46"

      # Cross-build aarch64 — DEFERRED. vani's src/alsa.cyr was lifted
      # from cyrius/lib/audio.cyr at v0.1.0 and still uses raw SYS_OPEN
      # / syscall(SYS_*, ...) ioctl callers that don't translate to
      # aarch64 syscall numbers. Yukti hit this exact issue and fixed
      # it in 2.1.3 by migrating to the stdlib's arch-translating
      # sys_open / sys_close / sys_ioctl wrappers. Vani needs the same
      # migration; tracked in docs/development/roadmap.md.
      #
      # When that lands, drop this comment and re-enable a step like:
      #   CYRIUS_DCE=1 cyrius build --aarch64 programs/smoke.cyr build/vani_smoke-aarch64
      #   file build/vani_smoke-aarch64 | grep -q "aarch64"

      - name: Test
        run: cyrius test tests/tcyr/vani.tcyr

      - name: Bench
        # Bench results land on stdout; CI only verifies the suite
        # runs without crashing. Trend tracking lives in
        # bench-history.csv (manual updates per minor cut).
        run: cyrius bench tests/bcyr/vani.bcyr

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only — rejects patterns in # comments.
        # Use awk instead of "grep -v '# '" which would eat any line
        # with an inline comment and hide real hits.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # execve(59) / fork(57) — vani is library code; spawning is
          # never legitimate and any future appearance needs review.
          scan "raw execve"   'syscall( *59'
          scan "raw fork"     'syscall( *57'
          # sys_system in src/ requires explicit sanitization review
          scan "sys_system"   '\bsys_system\s*('
          # Hardcoded system paths vani has no business writing to.
          # /dev/snd/ and /sys/class/sound/ are read-only walks via
          # yukti's enumerator — vani itself never opens them O_WRONLY.
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64KB — force heap review).
          # The 608-byte HW_PARAMS struct in src/device.cyr is the
          # largest legitimate stack alloc; anything an order of
          # magnitude past that is suspicious.
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
