name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          # Install into the version-pinned layout cyrius CLI expects
          # (~/.cyrius/versions/$VERSION/{bin,lib}/), then symlink
          # ~/.cyrius/{bin,lib} â†’ versions/$VERSION/... and write the
          # current-version pointer. Pre-v5.11.x: the tarball went
          # straight to ~/.cyrius/{bin,lib}/, which broke stdlib
          # resolution after cyrius started preferring the version-
          # pinned path (assert.cyr / etc. came up "undefined").
          mkdir -p "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin"
          mkdir -p "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib/" 2>/dev/null || true
          # cycc_aarch64 (renamed from cc5_aarch64 in Cyrius 6.0) may
          # ship under bin/ (picked up by the bin/* copy above) or at
          # the tarball top-level depending on the release. Cover both.
          # Same workaround agnosys / sankoch / yukti carry.
          [ -f "$CYRIUS_DIR/cycc_aarch64" ] && cp "$CYRIUS_DIR/cycc_aarch64" "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"
          chmod +x "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"* 2>/dev/null || true
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/bin"
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Lock file present
        # cyrius.lock is the supply-chain integrity anchor for the
        # [deps.yukti] git override (and any future git deps).
        # Without a committed lock, `cyrius deps` resolves fresh and
        # `cyrius deps --verify` trivially matches the just-created
        # lock â€” providing zero integrity. Guard catches accidental
        # .gitignore additions / deletions before they regress.
        # Audit reference: docs/audit/2026-04-30-v0.3.0-audit.md (LOW-1).
        run: |
          test -f cyrius.lock || {
            echo "::error::cyrius.lock missing â€” supply-chain integrity requires this committed"
            exit 1
          }

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # Skip when cyrius.lock is empty (Cyrius 6.0.1 bug: `cyrius deps`
        # reports "N deps resolved" but writes 0 entries to the lockfile,
        # then `--verify` bails with "no cyrius.lock found"). Restore
        # enforcement once the cu fix lands. Same workaround pattern
        # agnosys / patra carry.
        run: |
          if [ -s cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock empty â€” skipping hash verification (Cyrius 6.0.1 deps bug)"
          fi

      - name: Lint
        # Auto-discover so new modules are covered without editing CI.
        # Treat any warning as a failure (fail on any cyrlint "  warn " line).
        run: |
          fail=0
          for f in src/*.cyr programs/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Format check
        # `cyrius fmt <file>` (no flag) prints the formatted source to
        # stdout; diff against the committed file to enforce no drift.
        # Pre-0.9.2 this used `--check` but cyrius's `--check` mode is
        # exit-code-only and emits no stdout, so the diff always fired
        # spuriously â€” bumped to canonical invocation at 0.9.2 ship.
        run: |
          fail=0
          for f in src/*.cyr programs/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Vet
        run: cyrius vet programs/smoke.cyr

      - name: Verify dist bundles are in sync with src/
        # Both profiles regenerate cleanly. `core` is the playback-only
        # subset (src/alsa.cyr) introduced in 0.9.1 â€” see
        # cyrius-doom/docs/proposals/vani-audio-core-profile.md.
        run: |
          cyrius distlib
          cyrius distlib core
          fail=0
          for bundle in dist/vani.cyr dist/vani-core.cyr; do
            if ! git diff --quiet "$bundle"; then
              echo "ERROR: $bundle is stale. Run 'cyrius distlib [core]' and commit the result."
              git --no-pager diff "$bundle" | head -40
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1
          echo "dist bundles match src/"

      - name: Build smoke (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build programs/smoke.cyr build/vani_smoke
          echo "vani_smoke: $(wc -c < build/vani_smoke) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/vani_smoke | grep -q "7f45 4c46"

      - name: Cross-build aarch64
        # 0.9.0 unblocked the aarch64 cross-build path: src/alsa.cyr,
        # src/mixer.cyr, src/error.cyr, programs/* and tests/* migrated
        # from raw `syscall(SYS_OPEN, ...)` to stdlib `sys_open` /
        # `sys_close` / `sys_write` / `sys_exit` wrappers (and
        # `syscall(SYS_IOCTL, ...)` for ioctl, which has the
        # arch-correct constant on both peers). Patra pinned at 1.9.2
        # via [deps.patra] for the same reason. Yukti's 2.1.3 playbook
        # â€” same shape, same outcome.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            echo "::error::cycc_aarch64 missing from Cyrius $CYRIUS_VERSION â€” aarch64 cross-build is required since 0.9.0 (renamed from cc5_aarch64 in Cyrius 6.0)"
            exit 1
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 programs/smoke.cyr build/vani_smoke-aarch64
          file build/vani_smoke-aarch64 | grep -q "aarch64" || {
            echo "ERROR: build/vani_smoke-aarch64 is not an aarch64 ELF"; exit 1; }
          echo "vani_smoke-aarch64: $(wc -c < build/vani_smoke-aarch64) bytes"

      - name: Test
        run: cyrius test tests/tcyr/vani.tcyr

      - name: Bench
        # Bench results land on stdout; CI only verifies the suite
        # runs without crashing. Trend tracking lives in
        # bench-history.csv (manual updates per minor cut).
        run: cyrius bench tests/bcyr/vani.bcyr

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only â€” rejects patterns in # comments.
        # Use awk instead of "grep -v '# '" which would eat any line
        # with an inline comment and hide real hits.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # execve(59) / fork(57) â€” vani is library code; spawning is
          # never legitimate and any future appearance needs review.
          scan "raw execve"   'syscall( *59'
          scan "raw fork"     'syscall( *57'
          # sys_system in src/ requires explicit sanitization review
          scan "sys_system"   '\bsys_system\s*('
          # Hardcoded system paths vani has no business writing to.
          # /dev/snd/ and /sys/class/sound/ are read-only walks via
          # yukti's enumerator â€” vani itself never opens them O_WRONLY.
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64KB â€” force heap review).
          # The 608-byte HW_PARAMS struct in src/device.cyr is the
          # largest legitimate stack alloc; anything an order of
          # magnitude past that is suspicious.
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
