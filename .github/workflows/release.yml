name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step below enforces semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v1.3.0 == 1.3.0
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib/" 2>/dev/null || true
          # cycc_aarch64 (renamed from cc5_aarch64 in Cyrius 6.0) may
          # ship under bin/ (picked up by the bin/* copy above) or at
          # the tarball top-level depending on the release. Cover both.
          [ -f "$CYRIUS_DIR/cycc_aarch64" ] && cp "$CYRIUS_DIR/cycc_aarch64" "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"
          chmod +x "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"* 2>/dev/null || true
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/bin"
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      # vani 0.9.9: all-stdlib (no git deps, no committed lock) — the
      # `deps --verify` lock-integrity step is retired (see ci.yml).
      - name: Resolve deps
        run: cyrius deps

      - name: Build smoke (DCE) — x86_64
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build programs/smoke.cyr build/vani_smoke
          echo "vani_smoke: $(wc -c < build/vani_smoke) bytes"

      - name: Cross-build smoke (DCE) — aarch64
        # Released since vani 0.9.0; same playbook yukti's 2.1.3 used.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            echo "::error::cycc_aarch64 missing from Cyrius $CYRIUS_VERSION (renamed from cc5_aarch64 in Cyrius 6.0)"
            exit 1
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 programs/smoke.cyr build/vani_smoke-aarch64
          file build/vani_smoke-aarch64 | grep -q "aarch64" || {
            echo "ERROR: build/vani_smoke-aarch64 is not an aarch64 ELF"; exit 1; }
          echo "vani_smoke-aarch64: $(wc -c < build/vani_smoke-aarch64) bytes"

      - name: Test
        run: cyrius test tests/tcyr/vani.tcyr

      - name: Regenerate dist bundles (full + core)
        run: |
          cyrius distlib
          cyrius distlib core

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Source tarball — what consumers building from source clone.
          git archive --format=tar.gz --prefix="vani-${TAG}/" -o "vani-${TAG}-src.tar.gz" HEAD
          # Single-file dist bundles — primary consumer artifacts.
          # Full profile: vani's complete public surface (the vani_*
          # device wrapper, ring buffer, capture, mixer, yukti
          # adapter, format helpers, error helpers).
          # Core profile: PCM playback shim only (src/alsa.cyr) — much
          # smaller; suits consumers that just want
          # open/set_params/write/drain/close and don't want to pay
          # parse/codegen cost for the higher-level API. See
          # cyrius-doom/docs/proposals/vani-audio-core-profile.md.
          cp dist/vani.cyr "vani-${TAG}.cyr"
          cp dist/vani-core.cyr "vani-${TAG}-core.cyr"
          # vani has no CLI binary, but the smoke ELFs are the build
          # proof — ship them so consumers can sanity-check the toolchain
          # produced a working linked artifact for this tag on each arch.
          if [ -f build/vani_smoke ]; then
            cp build/vani_smoke "vani-${TAG}-smoke-x86_64-linux"
          fi
          if [ -f build/vani_smoke-aarch64 ]; then
            cp build/vani_smoke-aarch64 "vani-${TAG}-smoke-aarch64-linux"
          fi
          sha256sum vani-*.tar.gz vani-*.cyr vani-*-linux 2>/dev/null > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            vani-*.tar.gz
            vani-*.cyr
            vani-*-linux
            cyrius.lock
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        # Extract the section for this tag from CHANGELOG.md — print
        # everything between `## [TAG]` and the next `## [` heading.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "vani ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            vani-*.tar.gz
            vani-*.cyr
            vani-*-linux
            cyrius.lock
            SHA256SUMS
